<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Glossary</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- KaTeX for inline math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">LLM Glossary</h1>
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="Search terms..." autocomplete="off">
      <div id="search-results" class="search-results hidden"></div>
    </div>
    <div class="header-right">
      <button class="header-btn" id="home-btn">Home</button>
      <a href="graph.html" class="header-btn">Graph</a>
    </div>
  </header>

  <main>
    <div class="scroll-zone scroll-zone--left" id="scroll-zone-left"></div>
    <div class="carousel-track" id="carousel-track">
      <!-- Cards rendered by JS -->
    </div>
    <div class="scroll-zone scroll-zone--right" id="scroll-zone-right"></div>
  </main>

  <footer class="history-bar" id="history-bar">
    <!-- History reel rendered by JS -->
  </footer>

  <!-- Overlay for expanded card -->
  <div class="overlay hidden" id="overlay">
    <div class="overlay-card" id="overlay-card">
      <button class="overlay-close" id="overlay-close">&times;</button>
      <div id="overlay-content"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/history.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
