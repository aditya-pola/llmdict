<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Glossary — Graph View</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <style>
    html, body { background: #fafafa; color: #000; overflow: hidden; }
    main { padding: 0; flex: 1; position: relative; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas:active { cursor: grabbing; }

    /* Floating header — matches main page */
    .graph-header {
      position: fixed;
      top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(16px);
      border-radius: 58px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .graph-header .site-title {
      font-size: 14px; font-weight: 500;
      letter-spacing: -0.56px; white-space: nowrap; color: #fff;
    }
    .graph-header .search-wrapper { position: relative; }
    .graph-header #graph-search {
      width: 180px; padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 58px; color: #fff;
      font-family: var(--font); font-weight: 500;
      font-size: 12px; letter-spacing: -0.24px; outline: none;
      transition: width 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }
    .graph-header #graph-search::placeholder { color: rgba(255,255,255,0.35); }
    .graph-header #graph-search:focus {
      width: 240px; border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.15);
    }
    .graph-search-results {
      position: absolute; top: calc(100% + 8px); left: 0; width: 280px;
      background: #111; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; max-height: 280px; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 200;
      display: none;
    }
    .graph-search-results.visible { display: block; }
    .graph-search-results .gs-item {
      padding: 8px 14px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: #fff; font-size: 13px; transition: background 0.15s;
    }
    .graph-search-results .gs-item:hover { background: #1a1a1a; }
    .graph-search-results .gs-item:last-child { border-bottom: none; }

    .graph-btn {
      font-family: var(--font); font-size: 11px; font-weight: 500;
      letter-spacing: -0.22px;
      padding: 5px 12px; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 58px; color: rgba(255,255,255,0.5);
      background: none; cursor: pointer; text-decoration: none;
      transition: color 0.3s, background 0.3s;
    }
    .graph-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* Category legend */
    .graph-legend {
      position: fixed; bottom: 20px; left: 20px; z-index: 10;
      display: flex; flex-direction: column; gap: 3px;
      font-size: 10px; letter-spacing: -0.2px; color: rgba(0,0,0,0.4);
    }
    .graph-legend-item {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      padding: 2px 0; transition: color 0.15s;
    }
    .graph-legend-item:hover { color: #000; }
    .graph-legend-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    /* Tooltip — light theme */
    .graph-tooltip {
      position: fixed;
      background: #fff; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px; padding: 14px 16px; max-width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s ease; z-index: 50;
    }
    .graph-tooltip.visible { opacity: 1; }
    .graph-tooltip .tt-cat {
      font-size: 9px; font-weight: 500; letter-spacing: 1.2px;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .graph-tooltip .tt-name {
      font-size: 17px; font-weight: 500; letter-spacing: -0.6px; color: #000;
    }
    .graph-tooltip .tt-expansion {
      font-size: 11px; font-style: italic; color: rgba(0,0,0,0.35); margin-top: 2px;
    }
    .graph-tooltip .tt-oneliner {
      font-size: 12px; color: rgba(0,0,0,0.5); margin-top: 8px; line-height: 1.5;
    }

    /* Overlay — dark card (same as main page) */
    .graph-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px); z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .graph-overlay.active { opacity: 1; pointer-events: all; }
    .graph-overlay-card {
      background: #000; border-radius: 16px;
      width: 90%; max-width: 560px; max-height: 80vh;
      overflow-y: auto; padding: 30px; position: relative; color: #fff;
      transform: translateY(10px); opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
      box-shadow: 0px 4px 16px rgba(0,0,0,0.35), 0px 34px 44px rgba(0,0,0,0.17);
    }
    .graph-overlay.active .graph-overlay-card { transform: translateY(0); opacity: 1; }
    .graph-overlay-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
      width: 32px; height: 32px; color: #fff; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .graph-overlay-close:hover { background: rgba(255,255,255,0.25); }
    .graph-overlay-card .overlay-name { font-size: 28px; font-weight: 500; letter-spacing: -1.2px; }
    .graph-overlay-card .overlay-expansion { font-size: 12px; font-style: italic; color: rgba(255,255,255,0.35); margin-bottom: 18px; }
    .graph-overlay-card .overlay-section { margin-bottom: 18px; }
    .graph-overlay-card .overlay-section-title { font-size: 10px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px; }
    .graph-overlay-card .overlay-section-body { font-size: 13px; line-height: 1.65; color: #adadad; }
    .graph-overlay-card .paper-item, .graph-overlay-card .resource-item { font-size: 12px; color: #adadad; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .graph-overlay-card .paper-item a, .graph-overlay-card .resource-item a { color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.15); }
    .graph-overlay-card .paper-authors { color: rgba(255,255,255,0.3); font-size: 11px; }
    .graph-overlay-card .related-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .graph-overlay-card .related-tag { font-size: 11px; padding: 4px 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 58px; color: rgba(255,255,255,0.5); cursor: pointer; background: none; transition: color 0.15s, border-color 0.15s; }
    .graph-overlay-card .related-tag:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .graph-overlay-card::-webkit-scrollbar { width: 3px; }
    .graph-overlay-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="graph-header">
    <span class="site-title">Graph View</span>
    <div class="search-wrapper">
      <input type="text" id="graph-search" placeholder="Search terms..." autocomplete="off">
      <div class="graph-search-results" id="graph-search-results"></div>
    </div>
    <a href="index.html" class="graph-btn">Glossary</a>
  </div>

  <div class="graph-legend" id="graph-legend"></div>

  <main>
    <canvas id="graph-canvas"></canvas>
  </main>

  <div class="graph-tooltip" id="tooltip">
    <div class="tt-cat" id="tt-cat"></div>
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-expansion" id="tt-expansion"></div>
    <div class="tt-oneliner" id="tt-oneliner"></div>
  </div>

  <div class="graph-overlay" id="graph-overlay">
    <div class="graph-overlay-card" id="graph-overlay-card">
      <button class="graph-overlay-close" id="graph-overlay-close">&times;</button>
      <div id="graph-overlay-content"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cards.js"></script>
  <script>
  (async function() {
    const { categories, entries } = await Data.load();
    const allEntries = Data.getAllEntries();
    const relMap = Data.buildRelationshipMap();

    const canvas = document.getElementById('graph-canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const ttCat = document.getElementById('tt-cat');
    const ttName = document.getElementById('tt-name');
    const ttExpansion = document.getElementById('tt-expansion');
    const ttOneliner = document.getElementById('tt-oneliner');
    const graphOverlay = document.getElementById('graph-overlay');
    const graphOverlayCard = document.getElementById('graph-overlay-card');
    const graphOverlayContent = document.getElementById('graph-overlay-content');
    const graphOverlayClose = document.getElementById('graph-overlay-close');
    const searchInput = document.getElementById('graph-search');
    const searchResults = document.getElementById('graph-search-results');
    const legendEl = document.getElementById('graph-legend');

    // Muted category colors (on light bg)
    const palette = [
      '#2563eb', '#7c3aed', '#db2777', '#dc2626', '#ea580c',
      '#d97706', '#65a30d', '#059669', '#0891b2', '#4f46e5',
      '#9333ea', '#c026d3', '#e11d48', '#f97316', '#84cc16',
      '#14b8a6', '#0ea5e9', '#6366f1', '#a855f7', '#ec4899',
      '#8b5cf6', '#06b6d4', '#10b981'
    ];
    const catColorMap = {};
    const catLabelMap = {};
    categories.forEach((c, i) => {
      catColorMap[c.id] = palette[i % palette.length];
      catLabelMap[c.id] = c.label;
    });

    // Build legend
    legendEl.innerHTML = categories.map(c =>
      `<div class="graph-legend-item" data-cat="${c.id}">
        <div class="graph-legend-dot" style="background:${catColorMap[c.id]}"></div>
        ${c.label}
      </div>`
    ).join('');

    // Term nodes
    const nodes = allEntries.map(e => ({
      id: e.id, name: e.name,
      expansion: e.expansion || '', oneliner: e.oneliner || '',
      category: e.category,
      x: 0, y: 0, vx: 0, vy: 0,
      color: catColorMap[e.category] || '#999',
      radius: (relMap[e.id] || []).length > 5 ? 6 : (relMap[e.id] || []).length > 2 ? 4.5 : 3,
      isCatNode: false
    }));

    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    // Category hub nodes — larger, act as cluster centers
    categories.forEach(c => {
      const catNode = {
        id: `__cat_${c.id}`, name: c.label,
        expansion: `${c.entries.length} terms`, oneliner: '',
        category: c.id,
        x: 0, y: 0, vx: 0, vy: 0,
        color: catColorMap[c.id] || '#999',
        radius: 9,
        isCatNode: true, catId: c.id
      };
      nodes.push(catNode);
      nodeMap[catNode.id] = catNode;
    });

    // Home node (virtual center node)
    const homeNode = { id: '__home__', name: 'Home', category: '__home__',
      x: 0, y: 0, vx: 0, vy: 0, color: '#000', radius: 12, isHome: true };
    nodes.push(homeNode);
    nodeMap['__home__'] = homeNode;

    // Edges: related terms + category-to-term connections + home-to-category
    const edges = [];
    const edgeSet = new Set();

    function addEdge(src, tgt, type) {
      const key = [src, tgt].sort().join('|');
      if (!edgeSet.has(key)) {
        edgeSet.add(key);
        edges.push({ source: src, target: tgt, type: type || 'related' });
      }
    }

    // Related term edges
    for (const e of allEntries) {
      for (const rid of (e.related || [])) {
        if (nodeMap[rid]) addEdge(e.id, rid, 'related');
      }
    }

    // Category → term edges
    categories.forEach(c => {
      const catNodeId = `__cat_${c.id}`;
      for (const eid of c.entries) {
        if (nodeMap[eid]) addEdge(catNodeId, eid, 'category');
      }
      // Home → category edges
      addEdge('__home__', catNodeId, 'home');
    });

    // Layout
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', () => { resize(); draw(); });

    const cx = canvas.width / 2, cy = canvas.height / 2;

    // Place home at center
    homeNode.x = cx; homeNode.y = cy;

    // Place category hubs in a ring, terms around each hub
    categories.forEach((cat, ci) => {
      const angle0 = (ci / categories.length) * Math.PI * 2 - Math.PI / 2;
      const clusterR = 280 + cat.entries.length * 3;
      const clusterCx = cx + Math.cos(angle0) * clusterR;
      const clusterCy = cy + Math.sin(angle0) * clusterR;

      // Position category hub node
      const catNode = nodeMap[`__cat_${cat.id}`];
      if (catNode) { catNode.x = clusterCx; catNode.y = clusterCy; }

      // Position terms around the hub
      cat.entries.forEach((eid, ei) => {
        const n = nodeMap[eid]; if (!n) return;
        const a = (ei / Math.max(cat.entries.length, 1)) * Math.PI * 2;
        const r = 40 + Math.random() * 50 + cat.entries.length * 1.2;
        n.x = clusterCx + Math.cos(a) * r;
        n.y = clusterCy + Math.sin(a) * r;
      });
    });

    // Force simulation
    for (let iter = 0; iter < 300; iter++) {
      // Repulsion
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
          let d = Math.sqrt(dx*dx + dy*dy) || 1;
          if (d > 400) continue;
          let f = 500 / (d * d);
          // Stronger repulsion between different categories
          if (nodes[i].category !== nodes[j].category) f *= 1.5;
          let fx = (dx/d)*f, fy = (dy/d)*f;
          nodes[i].vx -= fx; nodes[i].vy -= fy;
          nodes[j].vx += fx; nodes[j].vy += fy;
        }
      }
      // Springs (edges) — different strengths per type
      for (const e of edges) {
        const s = nodeMap[e.source], t = nodeMap[e.target]; if (!s || !t) continue;
        let dx = t.x-s.x, dy = t.y-s.y, d = Math.sqrt(dx*dx+dy*dy)||1;
        let targetLen, strength;
        if (e.type === 'category') { targetLen = 60; strength = 0.006; }
        else if (e.type === 'home') { targetLen = 200; strength = 0.002; }
        else { targetLen = s.category === t.category ? 50 : 120; strength = 0.003; }
        let f = (d - targetLen) * strength;
        let fx = (dx/d)*f, fy = (dy/d)*f;
        s.vx += fx; s.vy += fy; t.vx -= fx; t.vy -= fy;
      }
      // Center gravity (home stays fixed)
      for (const n of nodes) {
        if (n.isHome) { n.x = cx; n.y = cy; n.vx = 0; n.vy = 0; continue; }
        n.vx += (cx - n.x) * 0.0005;
        n.vy += (cy - n.y) * 0.0005;
        n.vx *= 0.85; n.vy *= 0.85;
        n.x += n.vx; n.y += n.vy;
      }
    }

    // Interaction state
    let panX = 0, panY = 0, zoom = 1;
    let isDragging = false, dragMoved = false, lastMouse = {x:0,y:0};
    let hoveredNode = null;

    canvas.addEventListener('mousedown', e => { isDragging = true; dragMoved = false; lastMouse = {x:e.clientX, y:e.clientY}; });
    canvas.addEventListener('mousemove', e => {
      if (isDragging) {
        panX += e.clientX - lastMouse.x; panY += e.clientY - lastMouse.y;
        lastMouse = {x:e.clientX, y:e.clientY}; dragMoved = true;
      }
      const mx = (e.clientX - panX) / zoom, my = (e.clientY - panY) / zoom;
      hoveredNode = null;
      for (const n of nodes) {
        const dx = n.x - mx, dy = n.y - my;
        if (dx*dx + dy*dy < (n.radius + 8) * (n.radius + 8)) { hoveredNode = n; break; }
      }
      if (hoveredNode && !hoveredNode.isHome) {
        if (hoveredNode.isCatNode) {
          ttCat.textContent = 'Category';
          ttCat.style.color = hoveredNode.color;
          ttName.textContent = hoveredNode.name;
          ttExpansion.textContent = hoveredNode.expansion;
          ttOneliner.textContent = 'Click to see all terms';
        } else {
          ttCat.textContent = catLabelMap[hoveredNode.category] || '';
          ttCat.style.color = hoveredNode.color;
          ttName.textContent = hoveredNode.name;
          ttExpansion.textContent = hoveredNode.expansion;
          ttOneliner.textContent = hoveredNode.oneliner;
        }
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top = (e.clientY + 16) + 'px';
        tooltip.classList.add('visible');
        canvas.style.cursor = 'pointer';
      } else {
        tooltip.classList.remove('visible');
        canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
      }
      draw();
    });
    canvas.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      // Zoom toward mouse position
      const mx = e.clientX, my = e.clientY;
      panX = mx - (mx - panX) * factor;
      panY = my - (my - panY) * factor;
      zoom *= factor;
      zoom = Math.max(0.15, Math.min(6, zoom));
      draw();
    }, { passive: false });

    // Click
    canvas.addEventListener('click', e => {
      if (dragMoved) return;
      const mx = (e.clientX - panX) / zoom, my = (e.clientY - panY) / zoom;
      for (const n of nodes) {
        if (n.isHome) continue;
        const dx = n.x - mx, dy = n.y - my;
        if (dx*dx + dy*dy < (n.radius + 8) * (n.radius + 8)) {
          if (n.isCatNode) {
            // Open category listing overlay
            const cat = categories.find(c => c.id === n.catId);
            if (cat) {
              const termList = cat.entries.map(eid => entries[eid]).filter(Boolean);
              graphOverlayContent.innerHTML = `
                <div class="overlay-name">${cat.label}</div>
                <div class="overlay-expansion">${termList.length} terms</div>
                <div class="overlay-section">
                  <ul style="list-style:none;display:flex;flex-direction:column;gap:0;">
                    ${termList.map(t => `<li style="border-bottom:1px solid rgba(255,255,255,0.06);">
                      <span class="related-tag" data-target="${t.id}" style="display:block;border:none;border-radius:0;padding:9px 0;font-size:14px;">${t.name}</span>
                    </li>`).join('')}
                  </ul>
                </div>`;
              graphOverlay.classList.add('active');
            }
          } else {
            const entry = entries[n.id];
            if (entry) openGraphOverlay(entry);
          }
          return;
        }
      }
    });

    // Legend click → pan to category cluster
    legendEl.addEventListener('click', e => {
      const item = e.target.closest('.graph-legend-item');
      if (!item) return;
      const catId = item.dataset.cat;
      const cat = categories.find(c => c.id === catId);
      if (!cat || cat.entries.length === 0) return;
      // Find center of cluster
      let sx = 0, sy = 0, count = 0;
      for (const eid of cat.entries) {
        const n = nodeMap[eid]; if (!n) continue;
        sx += n.x; sy += n.y; count++;
      }
      if (count === 0) return;
      const tx = sx / count, ty = sy / count;
      // Pan to center on this cluster
      panX = canvas.width / 2 - tx * zoom;
      panY = canvas.height / 2 - ty * zoom;
      draw();
    });

    // Search
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      const results = Data.search(q);
      if (results.length === 0) { searchResults.classList.remove('visible'); return; }
      searchResults.innerHTML = results.slice(0, 8).map(e =>
        `<div class="gs-item" data-id="${e.id}">${e.name}</div>`
      ).join('');
      searchResults.classList.add('visible');
    });
    searchInput.addEventListener('focus', () => { if (searchInput.value.trim()) searchInput.dispatchEvent(new Event('input')); });
    document.addEventListener('click', e => {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.classList.remove('visible');
      }
    });
    searchResults.addEventListener('click', e => {
      const item = e.target.closest('.gs-item');
      if (!item) return;
      const id = item.dataset.id;
      searchInput.value = '';
      searchResults.classList.remove('visible');
      // Pan to node
      const n = nodeMap[id];
      if (n) {
        panX = canvas.width / 2 - n.x * zoom;
        panY = canvas.height / 2 - n.y * zoom;
        hoveredNode = n;
        draw();
        // Open overlay
        const entry = entries[id];
        if (entry) setTimeout(() => openGraphOverlay(entry), 300);
      }
    });

    // Overlay
    function openGraphOverlay(entry) {
      graphOverlayContent.innerHTML = Cards.renderOverlayContent(entry, entries);
      graphOverlay.classList.add('active');
    }
    function closeGraphOverlay() {
      graphOverlay.classList.remove('active');
    }
    graphOverlayClose.addEventListener('click', closeGraphOverlay);
    graphOverlay.addEventListener('click', e => { if (e.target === graphOverlay) closeGraphOverlay(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGraphOverlay(); });
    graphOverlayCard.addEventListener('click', e => {
      const tag = e.target.closest('[data-target]');
      if (tag) {
        const entry = entries[tag.dataset.target];
        if (entry) { closeGraphOverlay(); setTimeout(() => openGraphOverlay(entry), 200); }
      }
    });

    // --- Draw ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);

      const hovCat = hoveredNode ? hoveredNode.category : null;
      const hovId = hoveredNode ? hoveredNode.id : null;
      const hovRelated = hovId ? new Set(relMap[hovId] || []) : new Set();

      // Edges — draw by type layers (home first, then category, then related on top)
      const edgeLayers = [
        edges.filter(e => e.type === 'home'),
        edges.filter(e => e.type === 'category'),
        edges.filter(e => e.type === 'related')
      ];

      for (const layer of edgeLayers) {
        for (const e of layer) {
          const s = nodeMap[e.source], t = nodeMap[e.target];
          if (!s || !t) continue;

          let alpha, width;
          if (e.type === 'home') { alpha = 0.08; width = 1; }
          else if (e.type === 'category') { alpha = 0.04; width = 0.5; }
          else { alpha = 0.05; width = 0.5; }

          if (hovId) {
            const connected = e.source === hovId || e.target === hovId;
            const sameCat = s.category === hovCat || t.category === hovCat;
            if (connected) {
              alpha = 0.5; width = e.type === 'related' ? 2 : 1.5;
            } else if (sameCat && e.type !== 'home') {
              alpha = 0.12;
            } else {
              alpha = 0.015;
            }
          }

          ctx.globalAlpha = 1;
          ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
          ctx.lineWidth = width;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;

      // Nodes
      for (const n of nodes) {
        // Home node
        if (n.isHome) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.font = '500 11px Inter, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('HOME', n.x, n.y + n.radius + 15);
          continue;
        }

        let alpha = 0.6;
        let r = n.radius;

        if (hovId) {
          if (n.id === hovId) { alpha = 1; r = n.radius * 1.6; }
          else if (hovRelated.has(n.id)) { alpha = 0.9; r = n.radius * 1.2; }
          else if (n.category === hovCat) { alpha = 0.7; }
          else { alpha = 0.1; }
        }

        // Category hub nodes — ring outline + always-visible label
        if (n.isCatNode) {
          ctx.globalAlpha = hovId ? (n.category === hovCat ? 1 : 0.15) : 0.8;
          // Filled circle
          ctx.beginPath();
          ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
          ctx.fillStyle = n.color;
          ctx.fill();
          // White center dot
          ctx.beginPath();
          ctx.arc(n.x, n.y, r * 0.45, 0, Math.PI * 2);
          ctx.fillStyle = '#fafafa';
          ctx.fill();
          // Label always visible
          ctx.globalAlpha = hovId ? (n.category === hovCat ? 0.9 : 0.15) : 0.55;
          ctx.fillStyle = n.color;
          ctx.font = `500 ${Math.max(9, 11 / Math.sqrt(zoom))}px Inter, sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(n.name, n.x, n.y + r + 13);
          ctx.globalAlpha = 1;
          continue;
        }

        // Regular term nodes
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = n.color;
        ctx.fill();
        ctx.globalAlpha = 1;

        // Label on hovered/connected/zoomed nodes
        if (zoom > 0.6 && (n.id === hovId || (hovId && hovRelated.has(n.id)) || (r > 4.5 && zoom > 1.5))) {
          ctx.globalAlpha = alpha * 0.7;
          ctx.fillStyle = `rgba(0,0,0,1)`;
          ctx.font = `500 ${Math.max(8, 10 / Math.sqrt(zoom))}px Inter, sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(n.name, n.x, n.y + r + 10);
          ctx.globalAlpha = 1;
        }
      }

      ctx.restore();
    }
    draw();
  })();
  </script>
</body>
</html>
