<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Dictionary</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preload" href="data/glossary.json" as="fetch" type="application/json" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css?v=19">
  <!-- KaTeX is loaded lazily by Cards.ensureKatexLoaded(), only when an
       overlay actually contains math (saves ~107 KB on most page views) -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">LLM Dictionary</h1>
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="Search terms..." autocomplete="off">
      <div id="search-results" class="search-results hidden"></div>
    </div>
  </header>

  <a href="graph.html" class="graph-pill" title="Graph View">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2.5"/><circle cx="19" cy="6" r="2.5"/><circle cx="12" cy="19" r="2.5"/><line x1="7" y1="7.5" x2="10" y2="17"/><line x1="17" y1="7.5" x2="14" y2="17"/><line x1="7.5" y1="6" x2="16.5" y2="6"/></svg>
  </a>

  <main>
    <div class="scroll-zone scroll-zone--left" id="scroll-zone-left"></div>
    <div class="stack-container" id="stack-container">
      <!-- Cards rendered by JS -->
    </div>
    <div class="scroll-zone scroll-zone--right" id="scroll-zone-right"></div>
  </main>

  <footer class="history-bar" id="history-bar"></footer>
  <button class="home-fab" id="home-btn" title="Go to Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </button>
  <button class="history-toggle" id="history-toggle">History <span class="history-count" id="history-count">0</span></button>
  <div class="history-mode-label" id="history-mode-label">Viewing history &middot; click a card or toggle off to return</div>

  <div class="overlay hidden" id="overlay">
    <div class="overlay-card" id="overlay-card">
      <button class="overlay-close" id="overlay-close">&times;</button>
      <div id="overlay-content"></div>
    </div>
  </div>

  <!-- Mobile peek labels (fixed at screen edges) -->
  <div class="mobile-peek-label mobile-peek-label--left" id="mobile-peek-left"></div>
  <div class="mobile-peek-label mobile-peek-label--right" id="mobile-peek-right"></div>

  <!-- Contributing button -->
  <a href="https://github.com/aditya-pola/llmdict/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener" class="contribute-btn" id="contribute-btn" title="Contribute a Card">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </a>

  <!-- Visitor globe overlay (opened by clicking the Visitor Map card) -->
  <div class="globe-overlay hidden" id="globe-overlay">
    <div class="globe-card">
      <button class="globe-close" id="globe-close">&times;</button>
      <div class="globe-title">Visitors</div>
      <div class="globe-content" id="globe-content">
        <script type="text/javascript" id="clustrmaps" src="//clustrmaps.com/map_v2.js?d=ibe_CemXSM4qo2LmiB-9nMdCqbTuGAZEIZLx-k17-Zw&cl=ffffff&w=a&co=000000&cmo=ff7a00&cmn=ff7a00&ct=333333&nz=m&c=ff7a00"></script>
      </div>
    </div>
  </div>

  <!-- Keyboard shortcut hint -->
  <div class="shortcut-hint" id="shortcut-hint">Press <kbd>?</kbd> for shortcuts</div>

  <!-- Shortcut overlay -->
  <div class="shortcut-overlay hidden" id="shortcut-overlay">
    <div class="shortcut-card">
      <div class="shortcut-title">Keyboard Shortcuts</div>
      <div class="shortcut-grid">
        <div class="shortcut-row"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> <span>Navigate cards</span></div>
        <div class="shortcut-row"><kbd>H</kbd> <span>Go home</span></div>
        <div class="shortcut-row"><kbd>S</kbd> <span>Focus search</span></div>
        <div class="shortcut-row"><kbd>G</kbd> <span>Toggle graph view</span></div>
        <div class="shortcut-row"><kbd>R</kbd> <span>Toggle history</span></div>
        <div class="shortcut-row"><kbd>Enter</kbd> <span>Expand card</span></div>
        <div class="shortcut-row"><kbd>Esc</kbd> <span>Close overlay</span></div>
        <div class="shortcut-row"><kbd>?</kbd> <span>This help</span></div>
      </div>
      <div class="shortcut-dismiss">Press any key to dismiss</div>
    </div>
  </div>

  <script defer src="js/data.js?v=19"></script>
  <script defer src="js/cards.js?v=19"></script>
  <script defer src="js/stack.js?v=19"></script>
  <script defer src="js/history.js?v=19"></script>
  <script defer src="js/search.js?v=19"></script>
  <script defer src="js/app.js?v=19"></script>
</body>
</html>
